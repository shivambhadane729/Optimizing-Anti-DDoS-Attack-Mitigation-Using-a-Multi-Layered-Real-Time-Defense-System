apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: anti-ddos-ingress
  annotations:
    kubernetes.io/ingress.class: "gce"
    # To enable Cloud Armor security policy, use:
    # networking.gke.io/v1beta1.FrontendConfig: "anti-ddos-frontend-config"
spec:
  rules:
  - http:
      paths:
      - path: /api/*
        pathType: ImplementationSpecific
        backend:
          service:
            name: backend-service
            port:
              number: 5000
      # If deploying frontend via Cloud Run or GKE instead of Cloud Storage:
      #- path: /*
      #  pathType: ImplementationSpecific
      #  backend:
      #    service:
      #      name: frontend-service
      #      port:
      #        number: 80
